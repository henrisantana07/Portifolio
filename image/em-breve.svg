<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Projeto em breve</title>
  <desc id="desc">Arte com fundo escuro e texto em breve para representar novo projeto.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff87"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1010" cy="130" r="130" fill="#2563eb" opacity="0.2"/>
  <circle cx="220" cy="550" r="170" fill="#00ff87" opacity="0.12"/>

  <rect x="110" y="95" width="980" height="485" rx="18" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="10 10"/>

  <text x="600" y="300" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="34" fill="#94a3b8" letter-spacing="8">
    PROXIMO CASE
  </text>
  <text x="600" y="370" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="86" font-weight="700" fill="url(#accent)">
    EM BREVE
  </text>
  <text x="600" y="430" text-anchor="middle" font-family="'Inter', sans-serif" font-size="26" fill="#cbd5e1" opacity="0.9">
    novo projeto em fase de planejamento e desenvolvimento
  </text>
</svg>
